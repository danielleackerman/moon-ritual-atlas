      <circle cx="56" cy="58" r="32" fill="#fafaf6" stroke="#d1d3d4"/>
      <path d="M45 78c34-18 34-48 0-58M62 78c34-18 34-48 0-58" fill="none" stroke="#2a3038" stroke-width="4" stroke-linecap="round"/>
