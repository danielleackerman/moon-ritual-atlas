<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Moon Ritual Atlas ritual flow preview</title>
  <desc id="desc">Preview of the ritual index, ritual paths, and notecard ritual page flow.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f1f2f0"/></linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#171923"/><stop offset="1" stop-color="#30343c"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#101218" flood-opacity="0.18"/></filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse"><path d="M38 0H0V38" fill="none" stroke="#2a3038" stroke-opacity="0.055" stroke-width="1"/></pattern>
  </defs>
  <rect width="1400" height="620" rx="42" fill="#f6f6f2"/>
  <rect width="1400" height="620" rx="42" fill="url(#grid)"/>
