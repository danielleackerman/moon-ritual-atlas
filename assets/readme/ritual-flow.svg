      <text x="36" y="170" fill="#59606a" font-family="Inter, system-ui, sans-serif" font-size="18">Paid gifts · Work reset · Receipt</text>
      <rect x="36" y="202" width="126" height="34" rx="17" fill="#20242a"/><text x="58" y="225" fill="#fff" font-family="Inter" font-size="15" font-weight="700">Open path</text>
    </g>
    <g transform="translate(620 0)" filter="url(#s)">
